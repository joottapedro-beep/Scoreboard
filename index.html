<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Football Analyst</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
 body {
  font-family: Arial;
  margin: 0;
  background: #f3f4f6;
}

header {
  background: white;
  padding: 15px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #e5e7eb;
}

header strong {
  font-size: 18px;
}

.btn {
  margin-left: 10px;
  padding: 8px 16px;
  border: none;
  background: #e5e7eb;
  cursor: pointer;
  border-radius: 8px;
  font-weight: 500;
}

.btn.active {
  background: #22c55e;
  color: white;
}

.container {
  padding: 24px;
}

/* CARD */
.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  margin-bottom: 12px;
}

/* JOGOS */
.match {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.match-teams {
  font-weight: 500;
}

.live {
  color: red;
  font-size: 12px;
  font-weight: bold;
}

/* NEWS */
.news-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.news-card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

.news-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.news-content {
  padding: 16px;
}

.news-date {
  font-size: 12px;
  color: #6b7280;
  margin-bottom: 8px;
}

.news-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}

.news-desc {
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 12px;
}

.news-link {
  color: #16a34a;
  font-weight: 500;
  font-size: 14px;
}
  </style>
</head>

<body>

<header>
  <div><strong>Football Analyst</strong></div>
  <div>
    <button class="btn active" onclick="showSection('games')">Jogos</button>
    <button class="btn" onclick="showSection('news')">Notícias</button>
  </div>
</header>

<div class="container">
<div class="container">

  <h2>Jogos ao Vivo</h2>
  <div id="games-list"></div>

  <h2 style="margin-top:40px;">Últimas Notícias</h2>
  <div id="news-list"></div>

</div>

<script>
  function showSection(section) {
  document.getElementById('games').style.display = 'none';
  document.getElementById('news').style.display = 'none';

  document.getElementById(section).style.display = 'block';

  // atualizar botão ativo
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));

  if (section === 'games') {
    document.querySelectorAll('.btn')[0].classList.add('active');
  } else {
    document.querySelectorAll('.btn')[1].classList.add('active');
  }
}
  const MATCHES = [
  { home: "Benfica", away: "Porto", league: "liga-pt", live: true },
  { home: "Man City", away: "Liverpool", league: "epl", live: true },
  { home: "Real Madrid", away: "Barcelona", league: "laliga", live: false }
];

function renderGames() {
  const container = document.getElementById("games-list");

  const liveGames = MATCHES.filter(m => m.live);

  container.innerHTML = `
    <div class="card">
      <table style="width:100%; border-collapse: collapse;">
        <thead>
          <tr style="text-align:left; font-size:12px; color:#666;">
            <th>Hora</th>
            <th>Estado</th>
            <th>Competição</th>
            <th>Jogo</th>
          </tr>
        </thead>
        <tbody>
          ${liveGames.map(m => `
            <tr style="border-top:1px solid #eee;">
              <td style="padding:10px 0;">Agora</td>
              <td><span style="color:red; font-size:12px;">● Ao Vivo</span></td>
              <td style="color:#666;">${m.league.toUpperCase()}</td>
              <td><strong>${m.home}</strong> vs ${m.away}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}
  const NEWS = [
  {
    title: "Benfica em risco de eliminação precoce na Liga dos Campeões",
    desc: "O Benfica enfrenta um momento delicado na Liga dos Campeões...",
    date: "22/01/2026",
    image: "https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a"
  },
  {
    title: "Rafa Silva é reforço do Benfica e chega para elevar a qualidade ofensiva!",
    desc: "O Sport Lisboa e Benfica confirmou a chegada de Rafa Silva...",
    date: "22/01/2026",
    image: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2"
  }
];

function renderNews() {
  const container = document.getElementById("news-list");

  container.innerHTML = `
    <div class="news-grid">
      ${NEWS.map(n => `
        <div class="news-card">
          <img src="${n.image}">
          <div class="news-content">
            <div class="news-date">📅 ${n.date}</div>
            <div class="news-title">${n.title}</div>
            <div class="news-desc">${n.desc}</div>
            <div class="news-link">Ler mais →</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}
  renderGames();
renderNews();
</script>

</body>
</html>
