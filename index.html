<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Football Analyst</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }

    .btn {
      margin-left: 10px;
      padding: 8px 14px;
      border: none;
      background: #eaeaea;
      cursor: pointer;
      border-radius: 6px;
    }

    .btn.active {
      background: #22c55e;
      color: white;
    }

    .container {
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <div><strong>Football Analyst</strong></div>
  <div>
    <button class="btn active" onclick="showSection('games')">Jogos</button>
    <button class="btn" onclick="showSection('news')">Notícias</button>
  </div>
</header>

<div class="container">

  <div id="games">
    <h2>Jogos ao Vivo</h2>
    <div id="games-list"></div>
  </div>

  <div id="news" style="display:none;">
    <h2>Notícias</h2>

    <button onclick="filterNews('all')">Todas</button>
    <button onclick="filterNews('liga-pt')">Liga Portugal</button>
    <button onclick="filterNews('epl')">Premier</button>

    <div id="news-list"></div>
  </div>

</div>

<script>
  function showSection(section) {
  document.getElementById('games').style.display = 'none';
  document.getElementById('news').style.display = 'none';

  document.getElementById(section).style.display = 'block';

  // atualizar botão ativo
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));

  if (section === 'games') {
    document.querySelectorAll('.btn')[0].classList.add('active');
  } else {
    document.querySelectorAll('.btn')[1].classList.add('active');
  }
}
</script>

</body>
</html>
